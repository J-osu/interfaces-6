<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>baggage-handling</title>
  </head>
    <div id="app"></div>
    <script>
      window.addEventListener('error', function(e) {
        document.body.innerHTML += '<div style="color:red; background:black; font-size:24px; position:absolute; z-index:9999; top:0; padding:20px; white-space:pre-wrap;">' + e.message + '<br>' + e.filename + ':' + e.lineno + '</div>';
      });
      window.addEventListener('unhandledrejection', function(e) {
        document.body.innerHTML += '<div style="color:red; background:black; font-size:24px; position:absolute; z-index:9999; top:100px; padding:20px; white-space:pre-wrap;">Promise Rejection: ' + (e.reason && e.reason.message ? e.reason.message : e.reason) + '</div>';
      });
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
